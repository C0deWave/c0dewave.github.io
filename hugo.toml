  description = "기술 블로그 - Kubernetes, DevOps, CI/CD, 그리고 생각들"

  [params.homeInfoParams]
    Title = "C0deWave's Blog"
    Content = "DevOps Engineer / SRE"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/C0deWave"

  [params.comments]
    enabled = true
