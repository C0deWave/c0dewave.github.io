baseURL = "https://blog.jmjang.net/"
languageCode = "ko"
title = "C0deWave's Blog"
theme = "PaperMod"
enableRobotsTXT = true

[pagination]
  pagerSize = 10

[outputs]
  home = ["HTML", "RSS", "JSON"]

[taxonomies]
  category = "categories"
  tag = "tags"

[params]
  author = "C0deWave"
  defaultTheme = "dark"
  ShowReadingTime = true
  ShowShareButtons = false
  ShowPostNavLinks = true
  ShowBreadCrumbs = true
  ShowCodeCopyButtons = true
  ShowToc = true
  TocOpen = true
  ShowRelatedPosts = true
  ShowScrollProgressBar = true
  description = "기술 블로그 - Kubernetes, DevOps, CI/CD, 그리고 생각들"
  fuseOpts = {keys = ["title", "permalink", "summary", "content"], includeMatches = true, threshold = 0.3, distance = 100}

  [params.homeInfoParams]
    Title = "C0deWave's Blog"
    Content = "DevOps Engineer / SRE"

  [[params.socialIcons]]
    name = "github"
    url = "https://github.com/C0deWave"

  [params.comments]
    enabled = true

[[menus.main]]
  identifier = "search"
  name = "🔍 검색"
  url = "/search/"
  weight = 10

[[menus.main]]
  identifier = "categories"
  name = "📂 카테고리"
  url = "/categories/"
  weight = 15

[[menus.main]]
  identifier = "tags"
  name = "🏷️ 태그"
  url = "/tags/"
  weight = 20

[[menus.main]]
  identifier = "archives"
  name = "📅 아카이브"
  url = "/archives/"
  weight = 30
